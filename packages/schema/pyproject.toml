[project]
name = "aau-ais-schema"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Kasper Fromm Pedersen", email = "kasperf@cs.aau.dk" }]
requires-python = ">=3.13"
dependencies = [
    "adbc-driver-manager==1.11.*",
    "duckdb==1.5.*",
    "loguru==0.7.*",
    "pyarrow>=23"
]

[dependency-groups]
dev = ["pyarrow-stubs==20.0.*"]

[project.scripts]
schema = "schema:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
